name: Generate Keystore (Run Once Only)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore and Print Base64
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -storepass android123 \
            -alias mknotes \
            -keypass android123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -dname "CN=MKNotes,O=MKNotes,C=IN"
          
          echo "====== BASE64 KEYSTORE (copy this) ======"
          base64 -w 0 debug.keystore
          echo ""
          echo "====== SHA-1 FINGERPRINT ======"
          keytool -list -v \
            -keystore debug.keystore \
            -alias mknotes \
            -storepass android123 \
            -keypass android123 | grep "SHA1:"
          echo "====== SHA-256 FINGERPRINT ======"
          keytool -list -v \
            -keystore debug.keystore \
            -alias mknotes \
            -storepass android123 \
            -keypass android123 | grep "SHA256:"
