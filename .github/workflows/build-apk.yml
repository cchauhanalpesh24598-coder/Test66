name: Build APK + Generate SHA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Install Gradle manually
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip gradle-8.4-bin.zip
          echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH

      # ✅ Generate Debug Keystore
      - name: Generate Debug Keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair \
            -keystore $HOME/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      # ✅ Print SHA (IMPORTANT)
      - name: Print SHA Fingerprints
        run: |
          keytool -list -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android

      # ✅ Generate Gradle Wrapper (Fix for missing jar)
      - name: Generate Gradle Wrapper
        working-directory: MKNotes
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        working-directory: MKNotes
        run: chmod +x gradlew

      # ✅ Clean Project
      - name: Clean Project
        working-directory: MKNotes
        run: ./gradlew clean

      # ✅ Build Debug APK
      - name: Build Debug APK
        working-directory: MKNotes
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ✅ Upload APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MKNotes-debug
          path: MKNotes/app/build/outputs/apk/debug/*.apk
          retention-days: 30
