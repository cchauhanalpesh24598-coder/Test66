name: Build APK + Generate SHA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ✅ Generate Debug Keystore (Same as Android default)
      - name: Generate Debug Keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair \
            -keystore $HOME/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      # ✅ PRINT SHA-1 & SHA-256 (IMPORTANT FOR FIREBASE)
      - name: Print SHA Fingerprints
        run: |
          keytool -list -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android

      # ✅ Make gradlew executable
      - name: Make gradlew executable
        working-directory: MKNotes
        run: chmod +x gradlew

      # ✅ Clean Build
      - name: Clean Project
        working-directory: MKNotes
        run: ./gradlew clean

      # ✅ Build Debug APK
      - name: Build Debug APK
        working-directory: MKNotes
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2048m"

      # ✅ Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MKNotes-debug
          path: MKNotes/app/build/outputs/apk/debug/*.apk
          retention-days: 30
