name: Build APK Stable SHA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Create FIXED Debug Keystore Only If Not Exists
      - name: Create Stable Debug Keystore
        run: |
          mkdir -p app/keystore
          if [ ! -f app/keystore/debug.keystore ]; then
            keytool -genkeypair \
              -keystore app/keystore/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      # ✅ Print SHA (Now It Will Always Be Same)
      - name: Print Stable SHA
        run: |
          keytool -list -v \
            -keystore app/keystore/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android

      - name: Make gradlew executable
        working-directory: MKNotes
        run: chmod +x gradlew

      - name: Clean Project
        working-directory: MKNotes
        run: ./gradlew clean

      - name: Build Debug APK Using Stable Keystore
        working-directory: MKNotes
        run: |
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=../app/keystore/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MKNotes-debug
          path: MKNotes/app/build/outputs/apk/debug/*.apk
          retention-days: 30
