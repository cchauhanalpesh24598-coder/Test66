name: Build APK Stable SHA (Fixed Path)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ Install Gradle
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip gradle-8.4-bin.zip
          echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH

      # ✅ Create Stable Debug Keystore INSIDE MKNotes
      - name: Create Stable Debug Keystore
        working-directory: MKNotes
        run: |
          mkdir -p keystore
          if [ ! -f keystore/debug.keystore ]; then
            keytool -genkeypair \
              -keystore keystore/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      # ✅ Print Stable SHA
      - name: Print Stable SHA
        working-directory: MKNotes
        run: |
          keytool -list -v \
            -keystore keystore/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android

      # ✅ Clean Project
      - name: Clean Project
        working-directory: MKNotes
        run: gradle clean

      # ✅ Build Debug APK
      - name: Build Debug APK
        working-directory: MKNotes
        run: |
          gradle assembleDebug \
            -Pandroid.injected.signing.store.file=keystore/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MKNotes-debug
          path: MKNotes/app/build/outputs/apk/debug/*.apk
          retention-days: 30
